mode: daemonset
image:
  repository: "otel/opentelemetry-collector-contrib"
presets:
  logsCollection:
    enabled: true
ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
  exporters:
    otlphttp/loki:
      endpoint: "http://loki.lgtm.svc.cluster.local:3100/otlp"
      tls:
        insecure: true
    otlp/tempo:
      endpoint: "tempo.lgtm.svc.cluster.local:4317"
      tls:
        insecure: true
  service:
    pipelines:
      logs:
        receivers: [filelog]
        exporters: [otlphttp/loki]
      traces:
        receivers: [otlp]
        exporters: [otlp/tempo]
