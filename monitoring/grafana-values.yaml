datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
    - name: Loki
      type: loki
      url: http://loki.lgtm.svc.cluster.local:3100
      access: proxy
      isDefault: true
    - name: Tempo
      type: tempo
      url: http://tempo.lgtm.svc.cluster.local:3200
      access: proxy
    - name: Mimir
      type: prometheus
      url: http://mimir-gateway.lgtm.svc.cluster.local:80/prometheus
      access: proxy
alerting:
  contactpoints.yaml:
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: Telegram
        receivers:
          - uid: telegram_1
            type: telegram
            settings:
              bottoken: "${TELEGRAM_TOKEN}"
              chatid: "${TELEGRAM_CHAT_ID}"
  policies.yaml:
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: Telegram
        group_by: ['alertname']
dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
      - name: 'Thesis-Dashboards'
        orgId: 1
        folder: 'Performance Test'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default
  dashboards:
    default:
      infra-dashboard:
        file: ./grafana-dashboard/Infrastructure-1774167916234.json 
      red-dashboard:
        file: ./grafana-dashboard/RED Method-1774167944531.json
